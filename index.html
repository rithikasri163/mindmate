<!DOCTYPE html>
<html>
<head>
  <title>Mental Health AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f4f8;
      text-align: center;
    }
    #chatBox {
      width: 80%;
      height: 300px;
      border: 1px solid #ccc;
      margin: 20px auto;
      overflow-y: scroll;
      padding: 10px;
      background: white;
      text-align: left;
    }
    input {
      width: 60%;
      padding: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>🧠 Mental Health Support Chatbot</h2>

<div id="chatBox"></div>

<input id="userInput" type="text" placeholder="Type your feelings...">
<br><br>

<button onclick="sendMessage()">Send</button>
<button onclick="startListening()">🎤</button>
<button onclick="clearHistory()">🗑 Clear</button>

<h3>Mood History</h3>
<ul id="history"></ul>

<h3>📊 Mood Summary</h3>
<p id="summary">No data yet</p>

<script>

let userName = "";
let moodCount = { happy:0, sad:0, angry:0, stress:0, neutral:0 };

addMessage("Bot: Hi! What's your name? 😊");

function sendMessage() {
  let input = document.getElementById("userInput");
  let text = input.value.toLowerCase();
  if (text === "") return;

  addMessage("You: " + text);

  if (userName === "") {
    userName = text;
    let reply = "Nice to meet you " + userName + " ❤️ How are you feeling today?";
    addMessage("Bot: " + reply);
    speak(reply);
    input.value = "";
    return;
  }

  let reply = getAIResponse(text);

  setTimeout(() => {
    addMessage("Bot: " + reply);
    speak(reply);
  }, 500);

  detectMood(text);
  updateSummary();

  input.value = "";
}

function getAIResponse(text) {

  if (text.includes("helpline") || text.includes("help number")) {
    return "📞 Sneha: 044-24640050 | 📞 Kiran: 1800-599-0019";
  }

  if (
    text.includes("die") ||
    text.includes("suicide") ||
    text.includes("kill myself") ||
    text.includes("no use of living") ||
    text.includes("help me")
  ) {
    return "I'm really sorry you're feeling this way ❤️ You are not alone.\nPlease contact:\n📞 Sneha: 044-24640050\n📞 Kiran: 1800-599-0019";
  }

  if (text.includes("stress")) {
    return "Take a deep breath 🌿 What’s causing your stress?";
  }

  if (text.includes("sad")) {
    return "I'm here for you ❤️ Want to share more?";
  }

  if (text.includes("happy")) {
    return "That's great 😊 Keep smiling!";
  }

  return "Tell me more about how you're feeling.";
}

function addMessage(msg) {
  let chatBox = document.getElementById("chatBox");
  let div = document.createElement("div");
  div.innerText = msg;

  if (msg.includes("📞")) {
    div.style.color = "red";
  }

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function detectMood(text) {
  let mood = "😐 Neutral";

  if (text.includes("happy")) { mood="😊 Happy"; moodCount.happy++; }
  else if (text.includes("sad")) { mood="😢 Sad"; moodCount.sad++; }
  else if (text.includes("stress")) { mood="😣 Stress"; moodCount.stress++; }
  else { moodCount.neutral++; }

  let li = document.createElement("li");
  li.innerText = mood;
  document.getElementById("history").appendChild(li);
}

function updateSummary() {
  document.getElementById("summary").innerText =
    "😊 "+moodCount.happy+" | 😢 "+moodCount.sad+" | 😣 "+moodCount.stress+" | 😐 "+moodCount.neutral;
}

function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

function startListening() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("userInput").value =
      event.results[0][0].transcript;
  }
}

function clearHistory() {
  document.getElementById("chatBox").innerHTML = "";
  document.getElementById("history").innerHTML = "";
  document.getElementById("summary").innerText = "No data yet";

  moodCount = { happy:0, sad:0, angry:0, stress:0, neutral:0 };
  userName = "";

  addMessage("Bot: Hi! What's your name? 😊");
}

</script>

</body>
</html>
